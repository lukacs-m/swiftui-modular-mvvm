name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    # macos-26 is the runner image carrying Xcode 26.x (Swift 6.3+). Its default
    # Xcode already matches .swift-version, but we select explicitly below so CI
    # stays deterministic as the image's default drifts.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Select Xcode via the standard action rather than a hardcoded path, which
      # breaks whenever the runner image rotates its installed Xcodes. The version
      # is a range so a patch bump (26.4.0 → 26.4.1) doesn't fail the build; widen
      # to '26' or 'latest-stable' if you want to always track the newest.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Show versions
        run: |
          swift --version
          xcodebuild -version

      # SwiftFormat, SwiftLint, and xcbeautify are preinstalled on macos-26.
      # Install only what might be missing (XcodeGen) and skip the rest.
      - name: Install XcodeGen
        run: brew install xcodegen swiftformat swiftlint

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Generate Xcode project
        run: make generate

      - name: Test packages
        run: make test

      - name: Build app
        run: make build DESTINATION='platform=iOS Simulator,name=iPhone 17'

